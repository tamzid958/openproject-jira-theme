<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Opira">
  <!-- Deep graphite plinth — same near-black as the dark-theme app
       surface so the favicon reads as the same brand in both themes. -->
  <rect width="32" height="32" rx="7" ry="7" fill="#0a0b0e"/>
  <!-- Hairline edge highlight, lit from above. -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" ry="6.5"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <!-- Inner top-edge sheen — the same "polished metal" trick the
       luxe-card class does in CSS. -->
  <defs>
    <linearGradient id="opira-sheen" x1="16" y1="2" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="6" ry="6" fill="url(#opira-sheen)"/>
  <!-- Aperture ring + dot — the maker's mark. Pairs with the topbar
       wordmark (1.5px platinum dot + ring) scaled up to read at 16×16. -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#cfd6dc"
          stroke-width="1.25" stroke-opacity="0.55"/>
  <circle cx="16" cy="16" r="3" fill="#ebeef2"/>
</svg>
